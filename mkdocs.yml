site_name: gut - Git with better UX
site_description: A pure Bash wrapper around Git. Friendlier commands, plain-English errors, and safety guardrails — with zero dependencies.
site_url: https://serpwings.com/gut
repo_url: https://github.com/serpwings/gut
repo_name: serpwings/gut
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Palette toggle for automatic/light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences  
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Configuration: configuration.md
    - Architecture: architecture.md
  - Commands:
    - Core Workflow:
      - init: commands/init.md
      - status: commands/status.md
      - save: commands/save.md
      - sync: commands/sync.md
      - branch & switch: commands/branch.md
    - Collaboration:
      - integrate: commands/integrate.md
      - replay: commands/replay.md
      - pr: commands/pr.md
      - patch: commands/patch.md
    - History & Inspection:
      - history: commands/history.md
      - compare: commands/compare.md
      - blame: commands/blame.md
      - stats: commands/stats.md
      - age: commands/age.md
    - Safety & Recovery:
      - undo: commands/undo.md
      - stash: commands/stash.md
      - snapshot: commands/snapshot.md
      - whoops: commands/whoops.md
      - rescue: commands/rescue.md
      - bisect: commands/bisect.md
    - Repo Management:
      - sub: commands/sub.md
      - big: commands/big.md
      - tag: commands/tag.md
      - protect: commands/protect.md
      - alias: commands/alias.md

